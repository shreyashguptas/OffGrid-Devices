name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only checks out, installs, lints, tests, and
# builds — it never writes to the repo. Capping GITHUB_TOKEN to read-only limits
# blast radius if a build-time dependency is compromised.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Dependency audit (supply chain)
        run: pnpm audit --audit-level=high

      - name: Verify Shopify (live)
        env:
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_STOREFRONT_PRIVATE_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PRIVATE_TOKEN }}
          SHOPIFY_STOREFRONT_PUBLIC_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_PUBLIC_TOKEN }}
          SHOPIFY_STOREFRONT_API_VERSION: ${{ secrets.SHOPIFY_STOREFRONT_API_VERSION }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "::notice::Fork PR — skipping live Shopify verify in GitHub Actions (secrets are not exposed to fork PRs)."
            exit 0
          fi
          if [ -z "${SHOPIFY_STORE_DOMAIN:-}" ] || [ -z "${SHOPIFY_STOREFRONT_PRIVATE_TOKEN:-}" ]; then
            echo "::notice::Shopify secrets not set in repo Actions — skipping live verify. Add SHOPIFY_STORE_DOMAIN and SHOPIFY_STOREFRONT_PRIVATE_TOKEN to run this in CI."
            exit 0
          fi
          pnpm verify:shopify

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium --with-deps

      - name: End-to-end tests
        run: pnpm test:e2e

  # ── Deploy to Cloudflare (only when the full `quality` suite is green) ──
  # `needs: quality` makes this job wait for — and require — every check above
  # (lint, unit, audit, live Shopify, build, e2e). If any fails, this job is
  # skipped and NOTHING is published, so the currently-live Worker version
  # keeps serving traffic untouched. The `if` limits deploys to direct pushes
  # to `main`; pull requests and other branches never deploy.
  deploy:
    name: Deploy to Cloudflare
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # contents:read is enough — the deploy authenticates to Cloudflare with the
    # API token below, never with the GITHUB_TOKEN.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds Next.js and adapts it for the Workers runtime into .open-next/.
      # Public NEXT_PUBLIC_* values are auto-loaded from the committed .env, so
      # the deployed bundle carries analytics + Turnstile exactly like local.
      - name: Build (OpenNext → Cloudflare)
        run: pnpm exec opennextjs-cloudflare build

      # Publishes a new immutable Worker version and makes it the live
      # deployment. wrangler reads these two from the environment to auth.
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec opennextjs-cloudflare deploy
